        <button class="hamburger" onclick="toggleHeader()">&#9776;</button>

        <h1>Contact Me</h1>
        <p>To get in touch with me, please fill out the form below:</p>
        <form id="contactForm">
            <section class="form-group">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required><br><br>
                <small id="nameError" class="error-msg"></small>
            </section>

            <section class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required><br><br>
                <small id="emailError" class="error-msg"></small>
            </section>

            <section class="form-group">
                <label for="phone">Phone Number:</label>
                <input type="tel" id="phone" name="phone" required><br><br>
                <small id="phoneError" class="error-msg"></small>
            </section>

            <section class="form-group">
                <label for="message">Message:</label><br>
                <textarea id="message" name="message" rows="5" cols="40" required></textarea><br><br>
                <small id="messageError" class="error-msg"></small>
            </section>

            <input type="submit" value="Submit">
        </form>
